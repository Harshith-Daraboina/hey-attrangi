<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="relative w-full bg-[#fff5ea] py-32 overflow-hidden border border-gray-300">
        <!-- Background Waves -->
        <div class="absolute inset-0 z-0 pointer-events-none">
          <!-- Top Wave (White) -->
          <svg class="absolute top-0 w-full h-[150px] text-white z-10" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="currentColor" d="M0,60 C400,250 800,-50 1440,120 L1440,0 L0,0 Z"></path>
          </svg>
          
          <!-- Orange Mound -->
          <svg class="absolute bottom-0 left-[-5%] w-[60%] h-[350px] text-[#df9043] z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path fill="currentColor" d="M 0 100 L 0 40 C 40 0, 70 20, 100 100 Z"></path>
          </svg>
        
          <!-- Bottom Wave (White) -->
          <svg class="absolute bottom-0 w-full h-[150px] text-white z-10" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="currentColor" d="M0,200 C480,350 960,50 1440,200 L1440,320 L0,320 Z"></path>
          </svg>
        </div>

        <div class="relative z-10 text-center">
            <h3 class="text-3xl font-black text-[#ff6000] mb-12">How it works?</h3>
            <div class="h-64 border-2 border-dashed border-gray-400">Content here</div>
        </div>
    </div>
</body>
</html>
